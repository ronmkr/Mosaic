name: Build Extension

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

      - name: Run Linter
        run: npm run lint

      - name: Create Zip Release
        run: |
          zip -r mosaic-home.zip . -x "*.git*" ".github*" ".gitignore" "README.md" "LICENSE" "CONTRIBUTING.md" "CODE_OF_CONDUCT.md"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mosaic-home-extension
          path: mosaic-home.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: mosaic-home.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
